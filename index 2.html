<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart Checklist</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:15px;}
.card { background:white; padding:15px; border-radius:10px; margin-bottom:10px;}
button { padding:12px; margin:5px; border:none; border-radius:8px;}
.next { background:green; color:white;}
.back { background:#ccc;}
</style>
</head>

<body>

<h2 id="title">Cart 1</h2>

<div class="card">
<p>Wheel Condition</p>
<button onclick="setVal('wheel','New')">New</button>
<button onclick="setVal('wheel','Mid')">Mid</button>
<button onclick="setVal('wheel','Replace')">Replace</button>
</div>

<div class="card">
<p>Checks</p>
<label><input type="checkbox" id="smooth"> Smooth</label><br>
<label><input type="checkbox" id="wobble"> No Wobble</label><br>
<label><input type="checkbox" id="noise"> No Noise</label>
</div>

<button class="back" onclick="back()">Back</button>
<button class="next" onclick="next()">Next</button>

<script>
let cart = 1;

function setVal(type,val){
 console.log(type,val);
}

function next(){
 if(cart<9){
  cart++;
  document.getElementById('title').innerText = "Cart " + cart;
 } else {
  alert("Done");
 }
}

function back(){
 if(cart>1){
  cart--;
  document.getElementById('title').innerText = "Cart " + cart;
 }
}
</script>

</body>
</html>
