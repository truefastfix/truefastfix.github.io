<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashing Heart</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  body {
    animation: backgroundFlash 0.09s infinite steps(1);
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .heart {
    position: relative;
    width: min(42vw, 260px);
    height: min(42vw, 260px);
    background: red;
    transform: rotate(-45deg);
    box-shadow:
      0 0 25px red,
      0 0 70px #ff0033,
      0 0 130px #ff4d4d;
    animation: heartBeatFlash 0.22s infinite alternate;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: red;
    border-radius: 50%;
    box-shadow:
      0 0 25px red,
      0 0 70px #ff0033;
  }

  .heart::before {
    top: -50%;
    left: 0;
  }

  .heart::after {
    left: 50%;
    top: 0;
  }

  .message {
    position: absolute;
    z-index: 5;
    color: white;
    text-align: center;
    font-size: clamp(38px, 10vw, 120px);
    font-weight: 900;
    letter-spacing: 0.08em;
    text-shadow:
      0 0 10px white,
      0 0 25px red,
      0 0 65px #ff0033,
      0 0 110px #ff6b6b;
    animation: textFlash 0.12s infinite steps(1);
  }

  .spark {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 18px white, 0 0 35px red;
    animation: fly 0.55s infinite linear;
  }

  button {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 20;
    padding: 12px 18px;
    border: none;
    border-radius: 9px;
    background: white;
    color: black;
    font-weight: 900;
    font-size: 15px;
  }

  #warning {
    position: fixed;
    left: 14px;
    right: 14px;
    bottom: 14px;
    z-index: 20;
    color: white;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.85);
    padding: 10px 12px;
    font-size: 14px;
    text-shadow: 0 0 8px black;
  }

  .paused, .paused * {
    animation-play-state: paused !important;
  }

  @keyframes backgroundFlash {
    0% { background: black; filter: invert(0) saturate(2); }
    25% { background: #250000; }
    50% { background: white; filter: invert(1) saturate(4); }
    75% { background: #ff0033; }
    100% { background: black; }
  }

  @keyframes heartBeatFlash {
    from {
      transform: rotate(-45deg) scale(0.82);
      filter: hue-rotate(0deg) brightness(1);
    }
    to {
      transform: rotate(-45deg) scale(1.28);
      filter: hue-rotate(25deg) brightness(2.2);
    }
  }

  @keyframes textFlash {
    0% { opacity: 1; transform: scale(1); color: white; }
    25% { opacity: 0.15; transform: scale(1.08); color: red; }
    50% { opacity: 1; transform: scale(0.94); color: white; }
    75% { opacity: 0.35; transform: scale(1.16); color: #ffb3b3; }
    100% { opacity: 1; transform: scale(1); color: white; }
  }

  @keyframes fly {
    from {
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(0) scale(0.4);
      opacity: 1;
    }
    to {
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-58vh) scale(1.8);
      opacity: 0;
    }
  }
</style>
</head>
<body>
<button onclick="togglePause()">STOP</button>

<div class="stage" id="stage">
  <div class="heart"></div>
  <div class="message">I LOVE YOU</div>
</div>

<div id="warning">
  ⚠ FLASH WARNING: This page flashes fast. Do not use around anyone sensitive to flashing lights.
</div>

<script>
  const stage = document.getElementById("stage");
  let paused = false;

  function makeSparks() {
    for (let i = 0; i < 48; i++) {
      const spark = document.createElement("div");
      spark.className = "spark";
      spark.style.left = "50%";
      spark.style.top = "50%";
      spark.style.setProperty("--angle", (i * 7.5) + "deg");
      spark.style.animationDelay = (-Math.random() * 0.55) + "s";
      stage.appendChild(spark);
    }
  }

  function togglePause() {
    paused = !paused;
    document.body.classList.toggle("paused", paused);
    document.querySelector("button").textContent = paused ? "START" : "STOP";
  }

  makeSparks();
</script>
</body>
</html>
