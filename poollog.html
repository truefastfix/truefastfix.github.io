<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f5f73">
<title>Lied Lodge Pool & Spa Log</title>
<style>
:root{
  --blue:#1f5f73; --blue2:#153f4d; --cream:#f4f1e7; --paper:#fffdf7; --ink:#1f2a22;
  --muted:#687466; --border:#d7d0bd; --warn:#b06028; --bad:#9f2f2f; --good:#2f6b3f;
  --shadow:0 8px 20px rgba(31,42,34,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#edf7fa 0%,#ece6d5 100%);color:var(--ink)}
.app{max-width:660px;min-height:100vh;margin:0 auto;padding:16px 14px calc(132px + env(safe-area-inset-bottom))}
.header{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;border-radius:22px;padding:18px;box-shadow:0 10px 24px rgba(31,42,34,.18)}
.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:14px;background:#f4f1e7;display:grid;place-items:center;color:var(--blue);font-size:28px;font-weight:800}.kicker{font-size:13px;opacity:.88;letter-spacing:.04em;text-transform:uppercase}h1{font-size:24px;line-height:1.05;margin:3px 0 0}.sub{margin:12px 0 0;font-size:14px;opacity:.9}.statusline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;font-size:13px}.bar{height:8px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden;flex:1}.fill{height:100%;width:0;background:#c8e8f2;border-radius:999px;transition:.25s}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;margin-top:14px;gap:8px}.tab{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.13);color:white;border-radius:14px;padding:11px 8px;font-weight:800;font-size:14px}.tab.active{background:#fff;color:var(--blue)}
.card{background:var(--paper);border:1px solid var(--border);border-radius:20px;padding:16px;margin-top:14px;box-shadow:var(--shadow)}
.page-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}.page-title h2{font-size:21px;margin:0}.pill{background:#e1f0f3;color:#174655;border:1px solid #b8d8df;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:700;white-space:nowrap}
label.field{display:block;font-weight:700;margin:12px 0 7px}select,textarea,input{width:100%;border:1px solid var(--border);border-radius:14px;padding:13px 12px;font-size:16px;background:#fff;color:var(--ink)}textarea{min-height:96px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid{display:grid;gap:10px;margin-top:10px}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.checkbtn{border:1.5px solid var(--border);background:#fff;border-radius:14px;padding:12px;font-size:14px;font-weight:800;text-align:left}.checkbtn.active{border-color:var(--blue);background:#edf7fa}.choice{width:100%;border:1.5px solid var(--border);background:#fff;color:var(--ink);border-radius:16px;padding:14px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left}.choice small{display:block;font-weight:500;color:var(--muted);margin-top:3px}.mark{width:26px;height:26px;border:2px solid #a7aa9b;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;color:white;background:white;font-size:17px}.choice.active{border-color:var(--blue);background:#edf7fa}.choice.active .mark{background:var(--blue);border-color:var(--blue)}.choice.active .mark:before{content:"✓"}.choice.warn.active{border-color:var(--warn);background:#fff4e8}.choice.bad.active{border-color:var(--bad);background:#fff0f0}.help{font-size:13px;color:var(--muted);line-height:1.35;margin-top:8px}.result{border-radius:18px;padding:14px;margin-top:12px;font-weight:800;border:1px solid var(--border)}.result.good{background:#eaf4e8;color:#285730;border-color:#bed4b8}.result.warn{background:#fff4e6;color:#8b4b16;border-color:#efc89a}.result.bad{background:#fff0f0;color:#8a2d2d;border-color:#e1b0b0}.notice{background:#eef8fb;border:1px solid #c2dde4;border-radius:16px;padding:12px;font-size:14px;line-height:1.4;margin-top:12px;color:#174655}.summary-row{border-bottom:1px solid #ebe5d6;padding:10px 0;font-size:14px}.summary-row b{display:block;font-size:15px;margin-bottom:3px}.summary-actions{display:grid;gap:10px;margin-top:14px}.footer{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(244,241,231,.92);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.footer-inner{max-width:660px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:16px;padding:15px 14px;font-size:16px;font-weight:800;box-shadow:0 6px 12px rgba(31,42,34,.12)}.btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--border)}.btn.primary{background:var(--blue);color:white}.btn.danger{background:#8b3a2f;color:white}.small{font-size:12px;color:var(--muted)}
@media(max-width:440px){.row,.checks{grid-template-columns:1fr}.tabs{grid-template-columns:1fr}.app{padding-left:10px;padding-right:10px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand"><div class="logo">💧</div><div><div class="kicker">Lied Lodge</div><h1>Pool & Spa Log</h1></div></div>
    <p class="sub">Separate Pool and Spa pages for readings, chemical action, equipment checks, and daily summary.</p>
    <div class="tabs">
      <button class="tab" id="tabPool" onclick="setPage('pool')">🏊 Pool</button>
      <button class="tab" id="tabSpa" onclick="setPage('spa')">♨️ Spa</button>
      <button class="tab" id="tabSummary" onclick="setPage('summary')">📋 Summary</button>
    </div>
    <div class="statusline"><span id="progressText">Pool Log</span><div class="bar"><div class="fill" id="progressFill"></div></div></div>
  </div>
  <div id="screen"></div>
</div>
<div class="footer"><div class="footer-inner"><button class="btn secondary" id="backBtn">Reset Entry</button><button class="btn primary" id="nextBtn">Save Entry</button></div></div>
<script>
const defaultChecks = ["Tested Water","Checked Controllers","Checked Chemical Levels","Emptied Baskets","Vacuumed Pool","Backwashed Filter","Cleaned Waterline","Leak Found","Maintenance Needed"];
const blank = body => ({date:new Date().toISOString().slice(0,10),time:new Date().toTimeString().slice(0,5),body,operator:"",status:"",ph:"",freeChlorine:"",combinedChlorine:"",orp:"",temp:"",alkalinity:"",calcium:"",flow:"",filterPressure:"",action:"",chemicalAdded:"",amount:"",equipment:"",workPerformed:"",followUp:"",notes:"",checks:[]});
let page = localStorage.getItem("poolSpaPage") || "pool";
let entries = JSON.parse(localStorage.getItem("poolSpaCurrent") || "null") || {pool:blank("Pool"), spa:blank("Spa")};
let logs = JSON.parse(localStorage.getItem("poolSpaLogs") || "[]");
const screen=document.getElementById("screen"), backBtn=document.getElementById("backBtn"), nextBtn=document.getElementById("nextBtn"), progressText=document.getElementById("progressText"), progressFill=document.getElementById("progressFill");
function current(){return entries[page]}
function saveCurrent(){localStorage.setItem("poolSpaCurrent",JSON.stringify(entries));}
function saveLogs(){localStorage.setItem("poolSpaLogs",JSON.stringify(logs));}
function setPage(p){page=p;localStorage.setItem("poolSpaPage",p);render();scrollTo(0,0)}
function num(v){const n=parseFloat(v);return Number.isFinite(n)?n:null}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function calcStatus(e){const flags=[];const ph=num(e.ph),fc=num(e.freeChlorine),cc=num(e.combinedChlorine),orp=num(e.orp);if(ph!==null&&(ph<7.2||ph>7.8))flags.push("pH out of range");if(fc!==null&&(fc<1||fc>10))flags.push("Free chlorine check needed");if(cc!==null&&cc>=0.5)flags.push("Combined chlorine high");if(orp!==null&&(orp<650||orp>900))flags.push("ORP alarm range");if(flags.length===0&&[ph,fc,orp].some(x=>x!==null))return "OK";if(flags.length===1)return flags[0];if(flags.length>1)return "Attention Needed";return "";}
function set(k,v){const e=current();e[k]=v;e.status=calcStatus(e);saveCurrent();render();}
function input(k,label,placeholder="",mode="text"){const e=current();return `<div><label class="field">${label}</label><input inputmode="${mode}" value="${esc(e[k])}" placeholder="${placeholder}" oninput="current()['${k}']=this.value;current().status=calcStatus(current());saveCurrent();render()"></div>`}
function textInput(k,label,placeholder=""){const e=current();return `<label class="field">${label}</label><input value="${esc(e[k])}" placeholder="${placeholder}" oninput="current()['${k}']=this.value;saveCurrent()">`}
function choice(label,value,sub="",cls=""){const e=current();const active=e.action===value;return `<button class="choice ${cls} ${active?'active':''}" onclick="set('action','${value}')"><span>${label}${sub?`<small>${sub}</small>`:""}</span><span class="mark"></span></button>`}
function toggleCheck(name){const e=current();e.checks=e.checks||[];e.checks=e.checks.includes(name)?e.checks.filter(x=>x!==name):[...e.checks,name];saveCurrent();render();}
function checkButton(name){const e=current();const active=(e.checks||[]).includes(name);return `<button class="checkbtn ${active?'active':''}" onclick="toggleCheck('${name}')">${active?'✓ ':'☐ '}${name}</button>`}
function resultClass(e){return e.status==="OK"?"good":e.status==="Attention Needed"?"bad":e.status?"warn":"";}
function renderTabs(){document.getElementById("tabPool").className="tab "+(page==='pool'?'active':'');document.getElementById("tabSpa").className="tab "+(page==='spa'?'active':'');document.getElementById("tabSummary").className="tab "+(page==='summary'?'active':'');}
function render(){renderTabs(); if(page==='summary')return renderSummary(); const e=current();progressText.textContent=`${e.body} Log`;progressFill.style.width=page==='pool'?"35%":"65%";backBtn.textContent="Reset Entry";nextBtn.textContent=`Save ${e.body}`;backBtn.onclick=resetEntry;nextBtn.onclick=saveEntry;screen.innerHTML=`<div class="card"><div class="page-title"><h2>${e.body} Page</h2><span class="pill">${logs.filter(l=>l.body===e.body).length} saved</span></div><div class="row"><div><label class="field">Date</label><input type="date" value="${esc(e.date)}" oninput="current().date=this.value;saveCurrent()"></div><div><label class="field">Time</label><input type="time" value="${esc(e.time)}" oninput="current().time=this.value;saveCurrent()"></div></div>${textInput('operator','Operator','Name or initials')}<div class="row">${input('ph','pH','7.2 - 7.8','decimal')}${input('freeChlorine','Free Chlorine','ppm','decimal')}</div><div class="row">${input('combinedChlorine','Combined Chlorine','ppm','decimal')}${input('orp','ORP','650 - 900','numeric')}</div><div class="row">${input('temp','Temperature','°F','decimal')}${input('alkalinity','Alkalinity','ppm','decimal')}</div><div class="row">${input('calcium','Calcium Hardness','ppm','decimal')}${input('filterPressure','Filter Pressure','psi','decimal')}</div>${textInput('flow','Flow / Pump Status','Normal / low / no flow')}${e.status?`<div class="result ${resultClass(e)}">Current status: ${e.status}</div>`:`<div class="notice">Enter readings. Status flags pH, free chlorine, combined chlorine, and ORP issues.</div>`}<label class="field">Quick Checks</label><div class="checks">${defaultChecks.map(checkButton).join('')}</div><label class="field">Action Taken</label><div class="grid">${choice('No Action','No Action','Readings OK')}${choice('Adjusted Chemicals','Adjusted Chemicals','Chemical added or feeder adjusted','warn')}${choice('Backwashed / Cleaned','Backwashed / Cleaned','Filter, baskets, deck, or waterline')}${choice('Reported Issue','Reported Issue','Needs follow-up or repair','bad')}</div><div class="row"><div>${textInput('chemicalAdded','Chemical Added','Chlorine, acid, bicarb...')}</div><div>${textInput('amount','Amount','Example: 1 gal / 2 cups')}</div></div>${textInput('equipment','Equipment Issue','Pump, feeder, controller, sensor, leak, alarm')}${textInput('workPerformed','Work Performed','What was cleaned, adjusted, reset, repaired, or checked')}${textInput('followUp','Follow Up Needed','Parts, repair, vendor, recheck, or none')}<label class="field">Log Notes</label><textarea placeholder="What happened, what you did/found, current status, what is needed next." oninput="current().notes=this.value;saveCurrent()">${esc(e.notes)}</textarea><p class="help">Local-only log. Use the property’s exact pool/spa target ranges if they differ.</p></div>`;}
function saveEntry(){const e=current();e.status=calcStatus(e);logs.push({...e,savedAt:new Date().toISOString()});saveLogs();entries[page]=blank(e.body);saveCurrent();render();scrollTo(0,0);alert(`${e.body} entry saved.`)}
function resetEntry(){const body=current().body;if(confirm(`Clear current unsaved ${body} entry?`)){entries[page]=blank(body);saveCurrent();render();}}
function todayLogs(){const d=new Date().toISOString().slice(0,10);return logs.filter(l=>l.date===d)}
function latest(body){return logs.filter(l=>l.body===body).slice(-1)[0]}
function latestBlock(body){const l=latest(body);if(!l)return `<div class="summary-row"><b>${body}</b>No entry saved yet.</div>`;return `<div class="summary-row"><b>${body} — ${esc(l.date)} ${esc(l.time)} — ${esc(l.status||'Logged')}</b>pH ${esc(l.ph||'-')} | FC ${esc(l.freeChlorine||'-')} | CC ${esc(l.combinedChlorine||'-')} | ORP ${esc(l.orp||'-')} | Temp ${esc(l.temp||'-')}<br>Action: ${esc(l.action||'-')} | Checks: ${esc((l.checks||[]).join(', ')||'-')}<br>Follow up: ${esc(l.followUp||'None listed')}</div>`}
function renderSummary(){progressText.textContent="Daily Summary";progressFill.style.width="100%";backBtn.textContent="Clear Logs";nextBtn.textContent="Save CSV";backBtn.onclick=clearLogs;nextBtn.onclick=saveCSV;const t=todayLogs();screen.innerHTML=`<div class="card"><div class="page-title"><h2>Daily Summary</h2><span class="pill">${t.length} today</span></div><div class="notice">Latest saved Pool and Spa entries are shown separately for quick handoff notes.</div>${latestBlock('Pool')}${latestBlock('Spa')}<div class="summary-actions"><button class="btn secondary" onclick="copySummary()">Copy Text Summary</button><button class="btn primary" onclick="saveCSV()">Save CSV</button></div></div>${logs.length?`<div class="card"><div class="page-title"><h2>History</h2><span class="pill">Last ${Math.min(logs.length,10)}</span></div>${logs.slice(-10).reverse().map(l=>`<div class="summary-row"><b>${esc(l.date)} ${esc(l.time)} — ${esc(l.body)} — ${esc(l.status||'Logged')}</b>pH ${esc(l.ph||'-')} | FC ${esc(l.freeChlorine||'-')} | ORP ${esc(l.orp||'-')} | Action: ${esc(l.action||'-')}<br>${esc(l.notes||'No notes')}</div>`).join('')}</div>`:''}`;}
function clearLogs(){if(confirm("Clear all saved Pool and Spa logs on this device?")){logs=[];saveLogs();render();}}
function csvEscape(v){return `"${String(v||"").replaceAll('"','""')}"`;}
function saveCSV(){const stamp=new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");const headers=["Date","Time","Body","Operator","Status","pH","Free Chlorine","Combined Chlorine","ORP","Temp","Alkalinity","Calcium","Flow","Filter Pressure","Checks","Action","Chemical Added","Amount","Equipment Issue","Work Performed","Follow Up","Notes"];const rows=logs.map(l=>[l.date,l.time,l.body,l.operator,l.status,l.ph,l.freeChlorine,l.combinedChlorine,l.orp,l.temp,l.alkalinity,l.calcium,l.flow,l.filterPressure,(l.checks||[]).join('; '),l.action,l.chemicalAdded,l.amount,l.equipment,l.workPerformed,l.followUp,l.notes].map(csvEscape).join(','));const blob=new Blob([headers.map(csvEscape).join(',')+'\n'+rows.join('\n')],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`pool-spa-log-${stamp}.csv`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
function copySummary(){const date=new Date().toLocaleDateString();const pool=latest('Pool'),spa=latest('Spa');function lines(l,name){if(!l)return [`${name}: No entry saved.`].join('\n');return [`${name}`,`Time: ${l.time||'-'}`,`Status: ${l.status||'Logged'}`,`Readings: pH ${l.ph||'-'}, FC ${l.freeChlorine||'-'}, CC ${l.combinedChlorine||'-'}, ORP ${l.orp||'-'}, Temp ${l.temp||'-'}`,`Action: ${l.action||'-'}${l.chemicalAdded?` — ${l.chemicalAdded} ${l.amount||''}`:''}`,`Equipment: ${l.equipment||'No equipment issue listed'}`,`Work performed: ${l.workPerformed||'Not listed'}`,`Follow up: ${l.followUp||'None listed'}`,`Notes: ${l.notes||'No notes'}`].join('\n')}const text=[`Lied Lodge Pool & Spa Log`, `Date: ${date}`, '', lines(pool,'Pool'), '', lines(spa,'Spa')].join('\n');navigator.clipboard.writeText(text).then(()=>alert('Pool & Spa summary copied.'));}
render();
</script>
</body>
</html>
